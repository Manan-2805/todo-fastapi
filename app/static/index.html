<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Todo App - Manage Your Tasks</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            overflow: hidden;
            width: 100%;
            max-width: 800px;
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            text-align: center;
        }

        .header h1 {
            font-size: 2em;
            margin-bottom: 10px;
        }

        .header p {
            opacity: 0.9;
        }

        .content {
            padding: 40px;
        }

        .page {
            display: none;
        }

        .page.active {
            display: block;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #333;
            font-weight: 600;
        }

        .form-group input,
        .form-group textarea {
            width: 100%;
            padding: 12px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 14px;
            transition: border-color 0.3s;
        }

        .form-group input:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: #667eea;
        }

        .form-group textarea {
            resize: vertical;
            min-height: 80px;
        }

        .btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            font-weight: 600;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        .btn:active {
            transform: translateY(0);
        }

        .btn-secondary {
            background: #6c757d;
        }

        .btn-danger {
            background: #dc3545;
        }

        .btn-success {
            background: #28a745;
        }

        .btn-small {
            padding: 6px 12px;
            font-size: 14px;
            margin: 0 5px;
        }

        .link {
            color: #667eea;
            cursor: pointer;
            text-decoration: underline;
            margin-left: 5px;
        }

        .todos-container {
            margin-top: 30px;
        }

        .todo-item {
            background: #f8f9fa;
            border-left: 4px solid #667eea;
            padding: 15px;
            margin-bottom: 15px;
            border-radius: 8px;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .todo-item:hover {
            transform: translateX(5px);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
        }

        .todo-item.completed {
            opacity: 0.7;
            border-left-color: #28a745;
        }

        .todo-item.completed .todo-title {
            text-decoration: line-through;
        }

        .todo-title {
            font-size: 18px;
            font-weight: 600;
            color: #333;
            margin-bottom: 5px;
        }

        .todo-description {
            color: #666;
            margin-bottom: 10px;
        }

        .todo-actions {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .user-info {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .user-info h3 {
            color: #333;
        }

        .add-todo-form {
            background: #f8f9fa;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 30px;
        }

        .empty-state {
            text-align: center;
            padding: 40px;
            color: #999;
        }

        .empty-state svg {
            width: 80px;
            height: 80px;
            margin-bottom: 20px;
            opacity: 0.5;
        }

        .alert {
            padding: 12px 20px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: none;
        }

        .alert.show {
            display: block;
        }

        .alert-success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }

        .alert-error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }

        .checkbox-label {
            display: flex;
            align-items: center;
            cursor: pointer;
        }

        .checkbox-label input[type="checkbox"] {
            margin-right: 10px;
            width: 20px;
            height: 20px;
            cursor: pointer;
        }

        @media (max-width: 600px) {
            .content {
                padding: 20px;
            }

            .header h1 {
                font-size: 1.5em;
            }

            .todo-actions {
                flex-direction: column;
            }

            .btn-small {
                width: 100%;
            }
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="header">
            <h1>📝 Todo App</h1>
            <p id="headerText">Organize your life, one task at a time</p>
        </div>

        <div class="content">
            <!-- Alert Messages -->
            <div id="alertSuccess" class="alert alert-success"></div>
            <div id="alertError" class="alert alert-error"></div>

            <!-- Login Page -->
            <div id="loginPage" class="page active">
                <h2 style="margin-bottom: 20px;">Login to Your Account</h2>
                <div class="form-group">
                    <label for="loginUsername">Username</label>
                    <input type="text" id="loginUsername" placeholder="Enter your username" autocomplete="username">
                </div>
                <div class="form-group">
                    <label for="loginPassword">Password</label>
                    <input type="password" id="loginPassword" placeholder="Enter your password"
                        autocomplete="current-password">
                </div>
                <button class="btn" onclick="login()">Login</button>
                <p style="margin-top: 20px;">Don't have an account?<span class="link"
                        onclick="showPage('registerPage')">Register here</span></p>
            </div>

            <!-- Register Page -->
            <div id="registerPage" class="page">
                <h2 style="margin-bottom: 20px;">Create New Account</h2>
                <div class="form-group">
                    <label for="registerUsername">Username</label>
                    <input type="text" id="registerUsername" placeholder="Choose a username" autocomplete="username">
                </div>
                <div class="form-group">
                    <label for="registerPassword">Password</label>
                    <input type="password" id="registerPassword" placeholder="Choose a password"
                        autocomplete="new-password">
                </div>
                <button class="btn" onclick="register()">Register</button>
                <p style="margin-top: 20px;">Already have an account?<span class="link"
                        onclick="showPage('loginPage')">Login here</span></p>
            </div>

            <!-- Home Page -->
            <div id="homePage" class="page">
                <div class="user-info">
                    <h3>Welcome, <span id="username"></span>! 👋</h3>
                    <button class="btn btn-secondary btn-small" onclick="logout()">Logout</button>
                </div>

                <div class="add-todo-form">
                    <h3 style="margin-bottom: 15px;">Add New Task</h3>
                    <div class="form-group">
                        <label for="todoTitle">Title</label>
                        <input type="text" id="todoTitle" placeholder="What needs to be done?">
                    </div>
                    <div class="form-group">
                        <label for="todoDescription">Description (optional)</label>
                        <textarea id="todoDescription" placeholder="Add more details..."></textarea>
                    </div>
                    <button class="btn" onclick="createTodo()">Add Task</button>
                </div>

                <div class="todos-container">
                    <h3 style="margin-bottom: 15px;">Your Tasks</h3>
                    <div id="todosContent"></div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let token = localStorage.getItem('token') || '';
        let currentUser = null;

        // Show specific page
        function showPage(pageId) {
            document.querySelectorAll('.page').forEach(page => page.classList.remove('active'));
            document.getElementById(pageId).classList.add('active');
            hideAlerts();
        }

        // Alert functions
        function showAlert(message, type = 'success') {
            hideAlerts();
            const alertId = type === 'success' ? 'alertSuccess' : 'alertError';
            const alertEl = document.getElementById(alertId);
            alertEl.textContent = message;
            alertEl.classList.add('show');
            setTimeout(() => hideAlerts(), 5000);
        }

        function hideAlerts() {
            document.getElementById('alertSuccess').classList.remove('show');
            document.getElementById('alertError').classList.remove('show');
        }

        // Register function
        async function register() {
            const username = document.getElementById('registerUsername').value.trim();
            const password = document.getElementById('registerPassword').value;

            if (!username || !password) {
                showAlert('Please fill in all fields', 'error');
                return;
            }

            try {
                const res = await fetch('/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });

                if (res.ok) {
                    showAlert('Registration successful! Please login.', 'success');
                    document.getElementById('registerUsername').value = '';
                    document.getElementById('registerPassword').value = '';
                    setTimeout(() => showPage('loginPage'), 2000);
                } else {
                    const error = await res.json();
                    showAlert(error.detail || 'Registration failed', 'error');
                }
            } catch (err) {
                showAlert('Network error. Please try again.', 'error');
            }
        }

        // Login function
        async function login() {
            const username = document.getElementById('loginUsername').value.trim();
            const password = document.getElementById('loginPassword').value;

            if (!username || !password) {
                showAlert('Please fill in all fields', 'error');
                return;
            }

            try {
                const formData = new FormData();
                formData.append('username', username);
                formData.append('password', password);

                const res = await fetch('/login', {
                    method: 'POST',
                    body: formData
                });

                if (res.ok) {
                    const data = await res.json();
                    token = data.access_token;
                    localStorage.setItem('token', token);

                    document.getElementById('loginUsername').value = '';
                    document.getElementById('loginPassword').value = '';

                    await loadUserInfo();
                    showPage('homePage');
                    loadTodos();
                    showAlert('Login successful!', 'success');
                } else {
                    showAlert('Invalid username or password', 'error');
                }
            } catch (err) {
                showAlert('Network error. Please try again.', 'error');
            }
        }

        // Logout function
        function logout() {
            token = '';
            currentUser = null;
            localStorage.removeItem('token');
            showPage('loginPage');
            showAlert('Logged out successfully', 'success');
        }

        // Load user info
        async function loadUserInfo() {
            try {
                const res = await fetch('/me', {
                    headers: { 'Authorization': `Bearer ${token}` }
                });

                if (res.ok) {
                    currentUser = await res.json();
                    document.getElementById('username').textContent = currentUser.username;
                } else {
                    logout();
                }
            } catch (err) {
                logout();
            }
        }

        // Create todo
        async function createTodo() {
            const title = document.getElementById('todoTitle').value.trim();
            const description = document.getElementById('todoDescription').value.trim();

            if (!title) {
                showAlert('Please enter a title', 'error');
                return;
            }

            try {
                const res = await fetch('/todos', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify({ title, description, completed: false })
                });

                if (res.ok) {
                    document.getElementById('todoTitle').value = '';
                    document.getElementById('todoDescription').value = '';
                    loadTodos();
                    showAlert('Task added successfully!', 'success');
                } else {
                    showAlert('Failed to add task', 'error');
                }
            } catch (err) {
                showAlert('Network error. Please try again.', 'error');
            }
        }

        // Load todos
        async function loadTodos() {
            try {
                const res = await fetch('/todos', {
                    headers: { 'Authorization': `Bearer ${token}` }
                });

                if (res.ok) {
                    const todos = await res.json();
                    renderTodos(todos);
                } else {
                    showAlert('Failed to load tasks', 'error');
                }
            } catch (err) {
                showAlert('Network error. Please try again.', 'error');
            }
        }

        // Render todos
        function renderTodos(todos) {
            const container = document.getElementById('todosContent');

            if (todos.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <svg fill="currentColor" viewBox="0 0 20 20">
                            <path d="M9 2a1 1 0 000 2h2a1 1 0 100-2H9z"></path>
                            <path fill-rule="evenodd" d="M4 5a2 2 0 012-2 3 3 0 003 3h2a3 3 0 003-3 2 2 0 012 2v11a2 2 0 01-2 2H6a2 2 0 01-2-2V5zm3 4a1 1 0 000 2h.01a1 1 0 100-2H7zm3 0a1 1 0 000 2h3a1 1 0 100-2h-3zm-3 4a1 1 0 100 2h.01a1 1 0 100-2H7zm3 0a1 1 0 100 2h3a1 1 0 100-2h-3z" clip-rule="evenodd"></path>
                        </svg>
                        <p>No tasks yet. Add one above!</p>
                    </div>
                `;
                return;
            }

            const html = todos.map(todo => `
                <div class="todo-item ${todo.completed ? 'completed' : ''}">
                    <div class="todo-title">${escapeHtml(todo.title)}</div>
                    <div class="todo-description">${escapeHtml(todo.description || '')}</div>
                    <div class="todo-actions">
                        <label class="checkbox-label">
                            <input type="checkbox" ${todo.completed ? 'checked' : ''} 
                                   onchange="toggleTodo(${todo.id}, ${!todo.completed})">
                            <span>${todo.completed ? 'Completed' : 'Mark as complete'}</span>
                        </label>
                        <button class="btn btn-danger btn-small" onclick="deleteTodo(${todo.id})">Delete</button>
                    </div>
                </div>
            `).join('');

            container.innerHTML = html;
        }

        // Toggle todo status
        async function toggleTodo(id, completed) {
            try {
                // Get current todo details
                const res = await fetch(`/todos/${id}`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });

                if (res.ok) {
                    const todo = await res.json();

                    // Update with new completed status
                    const updateRes = await fetch(`/todos/${id}`, {
                        method: 'PUT',
                        headers: {
                            'Content-Type': 'application/json',
                            'Authorization': `Bearer ${token}`
                        },
                        body: JSON.stringify({
                            title: todo.title,
                            description: todo.description,
                            completed: completed
                        })
                    });

                    if (updateRes.ok) {
                        loadTodos();
                        showAlert(completed ? 'Task marked as complete!' : 'Task marked as incomplete', 'success');
                    } else {
                        showAlert('Failed to update task', 'error');
                        loadTodos();
                    }
                }
            } catch (err) {
                showAlert('Network error. Please try again.', 'error');
                loadTodos();
            }
        }

        // Delete todo
        async function deleteTodo(id) {
            if (!confirm('Are you sure you want to delete this task?')) {
                return;
            }

            try {
                const res = await fetch(`/todos/${id}`, {
                    method: 'DELETE',
                    headers: { 'Authorization': `Bearer ${token}` }
                });

                if (res.ok) {
                    loadTodos();
                    showAlert('Task deleted successfully!', 'success');
                } else {
                    showAlert('Failed to delete task', 'error');
                }
            } catch (err) {
                showAlert('Network error. Please try again.', 'error');
            }
        }

        // Escape HTML to prevent XSS
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // Handle Enter key on login/register
        document.addEventListener('DOMContentLoaded', () => {
            document.getElementById('loginPassword').addEventListener('keypress', (e) => {
                if (e.key === 'Enter') login();
            });
            document.getElementById('registerPassword').addEventListener('keypress', (e) => {
                if (e.key === 'Enter') register();
            });
            document.getElementById('todoTitle').addEventListener('keypress', (e) => {
                if (e.key === 'Enter') createTodo();
            });

            // Check if user is already logged in
            if (token) {
                loadUserInfo().then(() => {
                    showPage('homePage');
                    loadTodos();
                }).catch(() => {
                    logout();
                });
            }
        });
    </script>
</body>

</html>
